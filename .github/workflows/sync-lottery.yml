name: 彩票数据同步

on:
  schedule:
    # 北京时间 21:35 = UTC 13:35 · 22:00 = UTC 14:00
    - cron: '35 13 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 同步数据到服务器
        env:
          LOTTERY_IMPORT_TOKEN: ${{ secrets.LOTTERY_IMPORT_TOKEN }}
        run: |
          cd server
          python local_sync.py https://www.592302.eu.cc
